<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Demo Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }
    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow: hidden;
      text-align: center;
      transition: 0.3s;
    }
    .card:hover {
      transform: scale(1.05);
    }
    .card img {
  width: 100%;
  height: auto; 
  aspect-ratio: 16 / 9; 
  object-fit: contain; 
  background: #eee; 
}
    .card h3 {
      margin: 10px 0;
    }
    .card a {
      display: inline-block;
      margin: 10px;
      padding: 10px 15px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
    .card a:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<header>
  <h1>My Work Practice</h1>
</header>

<div class="container">

  <div class="card">
    <img src="images/p10.png">
    <h3>Login Form</h3>
    <a href="Login Form.html">Open</a>
  </div>

  <div class="card">
    <img src="images/p11.png">
    <h3>Registration Form</h3>
    <a href="Registration Form.html">Open</a>
  </div>

  <div class="card">
    <img src="images/p12.png">
    <h3>Photo Gallery</h3>
    <a href="Photo Gallery.html">Open</a>
  </div>

  <div class="card">
    <img src="images/p13.png">
    <h3>Data Table</h3>
    <a href="Table.html">Open</a>
  </div>

</div>

</body>
</html>
